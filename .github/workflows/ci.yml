name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install root dependencies
        run: npm ci --legacy-peer-deps
      - name: Install API dependencies
        run: npm ci --legacy-peer-deps
        working-directory: apps/api
      - name: Install web dependencies
        run: npm ci --legacy-peer-deps
        working-directory: apps/web
      - name: Build shared package
        run: npm run build --workspace=packages/shared
      - name: Generate Prisma client
        run: npx prisma@5 generate
        working-directory: apps/api
      - name: Build API
        run: npm run build
        working-directory: apps/api
      - name: Build web
        run: npm run build
        working-directory: apps/web

  test-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: openseam_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install API dependencies
        run: npm ci --legacy-peer-deps
        working-directory: apps/api
      - name: Generate Prisma client
        run: npx prisma@5 generate
        working-directory: apps/api
      - name: Run API tests
        run: npm run test
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/openseam_test
